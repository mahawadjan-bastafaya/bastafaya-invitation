<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Invitation — Grande Rencontre des Bonso</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #12103a;
    font-family: 'Georgia', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    color: #e8dfc0;
  }

  .card {
    background: linear-gradient(160deg, #1a1650 0%, #0e0c2e 100%);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 16px;
    padding: 2rem 1.5rem;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .logo {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: rgba(201,168,76,0.6);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .etoile { color: #c9a84c; font-size: 1.2rem; }

  h1 {
    font-size: 1rem;
    font-weight: normal;
    color: #c9a84c;
    letter-spacing: 0.08em;
    margin-bottom: 0.3rem;
    text-transform: uppercase;
  }

  .sous-titre {
    font-size: 0.8rem;
    color: rgba(232,223,192,0.5);
    margin-bottom: 2rem;
    font-style: italic;
  }

  /* États */
  .etat { display: none; }
  .etat.actif { display: block; }

  /* CHARGEMENT */
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(201,168,76,0.2);
    border-top-color: #c9a84c;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 1.5rem auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* NOM INVITÉ */
  .invite-nom {
    font-size: 1.6rem;
    font-weight: bold;
    color: #e2c97e;
    margin: 1rem 0 0.3rem;
    line-height: 1.3;
  }
  .invite-code {
    font-size: 0.8rem;
    color: rgba(201,168,76,0.5);
    font-family: monospace;
    margin-bottom: 1.5rem;
  }

  /* BOUTON VALIDER */
  .btn-valider {
    background: linear-gradient(135deg, #c9a84c, #a8883c);
    color: #0f0f1a;
    border: none;
    border-radius: 50px;
    padding: 1rem 2.5rem;
    font-size: 1.1rem;
    font-weight: bold;
    font-family: 'Georgia', serif;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    margin-top: 0.5rem;
  }
  .btn-valider:hover { opacity: 0.9; transform: scale(1.02); }
  .btn-valider:active { transform: scale(0.98); }

  /* SUCCÈS */
  .succes-icon {
    font-size: 4rem;
    margin: 0.5rem 0;
    animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

  .succes-nom {
    font-size: 1.5rem;
    color: #e2c97e;
    font-weight: bold;
    margin: 0.5rem 0;
  }

  .succes-heure {
    font-size: 1.8rem;
    color: #4ade80;
    font-weight: bold;
    margin: 0.5rem 0;
    font-family: monospace;
  }

  .succes-detail {
    font-size: 0.85rem;
    color: rgba(232,223,192,0.6);
    margin-top: 0.5rem;
    font-style: italic;
  }

  /* DÉJÀ VALIDÉ */
  .deja-icon { font-size: 3rem; margin: 0.5rem 0; }
  .deja-msg {
    color: #fbbf24;
    font-size: 1rem;
    font-weight: bold;
    margin: 0.5rem 0;
  }
  .deja-detail {
    font-size: 0.85rem;
    color: rgba(232,223,192,0.5);
    margin-top: 0.5rem;
  }

  /* ERREUR */
  .erreur-icon { font-size: 3rem; margin: 0.5rem 0; }
  .erreur-msg {
    color: #f87171;
    font-size: 1rem;
    margin: 0.5rem 0;
  }

  /* MODAL BÉNÉVOLE */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #1a1650;
    border: 1px solid rgba(201,168,76,0.5);
    border-radius: 16px;
    padding: 2rem;
    max-width: 320px;
    width: 100%;
    text-align: center;
  }
  .modal h2 {
    color: #c9a84c;
    font-size: 1rem;
    margin-bottom: 0.5rem;
    letter-spacing: 0.05em;
  }
  .modal p {
    font-size: 0.85rem;
    color: rgba(232,223,192,0.6);
    margin-bottom: 1.2rem;
    font-style: italic;
  }
  .modal input {
    width: 100%;
    background: #0f0c2e;
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 8px;
    padding: 0.8rem;
    color: #e8dfc0;
    font-size: 1.1rem;
    font-family: 'Georgia', serif;
    text-align: center;
    outline: none;
    margin-bottom: 1rem;
  }
  .modal input:focus { border-color: #c9a84c; }
  .modal button {
    background: linear-gradient(135deg, #c9a84c, #a8883c);
    color: #0f0f1a;
    border: none;
    border-radius: 50px;
    padding: 0.8rem 2rem;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
  }

  .separateur {
    border: none;
    border-top: 1px solid rgba(201,168,76,0.15);
    margin: 1.5rem 0;
  }

  .btn-changer {
    background: none;
    border: none;
    color: rgba(201,168,76,0.4);
    font-size: 0.75rem;
    cursor: pointer;
    margin-top: 1rem;
    font-style: italic;
  }
  .btn-changer:hover { color: #c9a84c; }
</style>
</head>
<body>

<!-- Modal identification bénévole -->
<div class="modal-bg" id="modal-benevole">
  <div class="modal">
    <h2>✦ Identification bénévole</h2>
    <p>Entre ton prénom une seule fois pour toute la journée</p>
    <input type="text" id="input-prenom" placeholder="Ton prénom..." maxlength="30" autocomplete="off" />
    <button onclick="confirmerBenevole()">Confirmer</button>
  </div>
</div>

<div class="card">
  <div class="logo">✦ Grande Rencontre ✦<br>des Bonso de Karan Stafa</div>
  <h1>17 Octobre 2026</h1>
  <p class="sous-titre">Bobigny</p>

  <!-- CHARGEMENT -->
  <div class="etat" id="etat-chargement">
    <div class="spinner"></div>
    <p style="color:rgba(232,223,192,0.5);font-size:0.85rem;">Vérification en cours…</p>
  </div>

  <!-- INVITÉ TROUVÉ -->
  <div class="etat" id="etat-invite">
    <div class="invite-nom" id="display-nom"></div>
    <div class="invite-code" id="display-code"></div>
    <hr class="separateur">
    <button class="btn-valider" onclick="valider()">✓ Valider l'entrée</button>
    <button class="btn-changer" onclick="ouvrirModal()">Changer de bénévole</button>
  </div>

  <!-- SUCCÈS -->
  <div class="etat" id="etat-succes">
    <div class="succes-icon">✅</div>
    <div class="succes-nom" id="succes-nom"></div>
    <div class="succes-heure" id="succes-heure"></div>
    <div class="succes-detail" id="succes-detail"></div>
  </div>

  <!-- DÉJÀ VALIDÉ -->
  <div class="etat" id="etat-deja">
    <div class="deja-icon">⚠️</div>
    <div class="deja-msg">Déjà validé !</div>
    <div class="invite-nom" id="deja-nom"></div>
    <div class="deja-detail" id="deja-detail"></div>
  </div>

  <!-- ERREUR -->
  <div class="etat" id="etat-erreur">
    <div class="erreur-icon">❌</div>
    <div class="erreur-msg" id="erreur-msg"></div>
    <div class="succes-detail">Contacte un responsable</div>
  </div>
</div>

<script>
// ⚠️ REMPLACE PAR L'URL DE TON APPS SCRIPT DÉPLOYÉ
const SCRIPT_URL = 'COLLE_ICI_L_URL_DE_TON_APPS_SCRIPT';

// Récupère le code depuis l'URL : bastafaya.org/invitation/BST-26-0001
function getCodeFromURL() {
  const path = window.location.pathname;
  const parts = path.split('/');
  return parts[parts.length - 1].toUpperCase();
}

// Bénévole stocké localement sur le téléphone
function getBenevole() {
  return localStorage.getItem('benevole_bonso') || '';
}

function ouvrirModal() {
  document.getElementById('modal-benevole').classList.add('open');
  setTimeout(() => document.getElementById('input-prenom').focus(), 100);
}

function confirmerBenevole() {
  const prenom = document.getElementById('input-prenom').value.trim();
  if (!prenom) return;
  localStorage.setItem('benevole_bonso', prenom);
  document.getElementById('modal-benevole').classList.remove('open');
  // Relancer la vérification si on était en attente
  if (window._codeEnAttente) {
    charger();
  }
}

function afficher(etatId) {
  document.querySelectorAll('.etat').forEach(e => e.classList.remove('actif'));
  document.getElementById(etatId).classList.add('actif');
}

async function charger() {
  const code = getCodeFromURL();
  if (!code || code === 'INVITATION') {
    afficher('etat-erreur');
    document.getElementById('erreur-msg').textContent = 'Lien invalide';
    return;
  }

  afficher('etat-chargement');

  try {
    const res = await fetch(`${SCRIPT_URL}?action=check&code=${encodeURIComponent(code)}`);
    const data = await res.json();

    if (!data.success) {
      afficher('etat-erreur');
      document.getElementById('erreur-msg').textContent = data.message || 'Code introuvable';
      return;
    }

    if (data.deja_valide) {
      afficher('etat-deja');
      document.getElementById('deja-nom').textContent = data.nom;
      document.getElementById('deja-detail').textContent =
        `Validé à ${data.heure_validation} par ${data.valide_par}`;
      return;
    }

    // Invité trouvé, pas encore validé
    document.getElementById('display-nom').textContent = data.nom;
    document.getElementById('display-code').textContent = data.code;
    afficher('etat-invite');

  } catch (err) {
    afficher('etat-erreur');
    document.getElementById('erreur-msg').textContent = 'Erreur de connexion — vérifie le réseau';
  }
}

async function valider() {
  const benevole = getBenevole();
  if (!benevole) {
    window._codeEnAttente = true;
    ouvrirModal();
    return;
  }

  const code = getCodeFromURL();
  afficher('etat-chargement');

  try {
    const res = await fetch(
      `${SCRIPT_URL}?action=valider&code=${encodeURIComponent(code)}&benevole=${encodeURIComponent(benevole)}`
    );
    const data = await res.json();

    if (data.deja_valide) {
      afficher('etat-deja');
      document.getElementById('deja-nom').textContent = data.nom;
      document.getElementById('deja-detail').textContent =
        `Validé à ${data.heure_validation} par ${data.valide_par}`;
      return;
    }

    if (data.success) {
      afficher('etat-succes');
      document.getElementById('succes-nom').textContent = data.nom;
      document.getElementById('succes-heure').textContent = data.heure_validation;
      document.getElementById('succes-detail').textContent = `Validé par ${data.valide_par}`;
    } else {
      afficher('etat-erreur');
      document.getElementById('erreur-msg').textContent = data.message;
    }

  } catch (err) {
    afficher('etat-erreur');
    document.getElementById('erreur-msg').textContent = 'Erreur de connexion — réessaie';
  }
}

// Lancement
window._codeEnAttente = false;
if (!getBenevole()) {
  ouvrirModal();
} else {
  charger();
}
</script>
</body>
</html>
